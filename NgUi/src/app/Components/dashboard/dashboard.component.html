<div class="page-container">
  <div class="left-column">
    <div class="form-section">
      <button (click)="loadConfigurations()">Get Configurations</button>
    </div>

    <div class="result-section" *ngIf="configurations.length">
      <h3>Configurations:</h3>
      <ul>
        <li *ngFor="let config of configurations">{{ config }}</li>
      </ul>
    </div>

    <div *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </div>
  </div>

  <div class="right-column">
    <mat-form-field>
      <mat-label>Select Data Type</mat-label>
      <mat-select (selectionChange)="onTypeChange($event)">
        <mat-option value=""></mat-option>
        <mat-option *ngFor="let t of idoTables" [value]="t.value">
          {{ t.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="result-section" *ngIf="dataSource.data.length > 0">
      <h3>
        Table Attributes Count:
        <span class="count-badge">{{ dataSource.data.length }}</span>
      </h3>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Filter attributes</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Type to filter..." />
      </mat-form-field>

      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">
        <ng-container matColumnDef="attribute">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">
            Attribute Name
          </th>
          <td mat-cell *matCellDef="let row"> {{ row }} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [length]="dataSource.data.length"
                     [pageSize]="10"
                     [pageSizeOptions]="[5, 10, 25, 50, 100, 500]">
      </mat-paginator>
    </div>

    <div *ngIf="schemaErrorMessage" class="error">
      {{ schemaErrorMessage }}
    </div>
  </div>
</div>
<div class="spinner-overlay" *ngIf="isLoading">
  <mat-spinner diameter="75"></mat-spinner>
</div>
