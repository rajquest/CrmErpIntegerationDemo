<h2 mat-dialog-title>
  Serial Numbers – {{ data.selectedRow.item }}
</h2>

<mat-dialog-content>
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="Item">
      <th mat-header-cell *matHeaderCellDef>Item</th>
      <td mat-cell *matCellDef="let row">{{ row.item }}</td>
    </ng-container>

    <ng-container matColumnDef="SerNum">
      <th mat-header-cell *matHeaderCellDef>Serial</th>
      <td mat-cell *matCellDef="let row">{{ row.serNum }}</td>
    </ng-container>

    <ng-container matColumnDef="Stat">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">{{ row.stat }}</td>
    </ng-container>

    <ng-container matColumnDef="Loc">
      <th mat-header-cell *matHeaderCellDef>Loc</th>
      <td mat-cell *matCellDef="let row">{{ row.loc ?? '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="Lot">
      <th mat-header-cell *matHeaderCellDef>Lot</th>
      <td mat-cell *matCellDef="let row">{{ row.lot }}</td>
    </ng-container>

    <ng-container matColumnDef="ExpDate">
      <th mat-header-cell *matHeaderCellDef>Expiry</th>
      <td mat-cell *matCellDef="let row">
        {{ Utils.parseInforDate(row.expDate) | date:'yyyy-MM-dd' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="Whse">
      <th mat-header-cell *matHeaderCellDef>Whse</th>
      <td mat-cell *matCellDef="let row">{{ row.Whse }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
