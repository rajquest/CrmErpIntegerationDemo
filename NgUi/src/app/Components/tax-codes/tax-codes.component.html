<div class="taxcode-container">
  <h2>Infor ERP Tax Codes</h2>

  <mat-form-field appearance="outline" class="filter-box">
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search tax code, jurisdiction, description" />
  </mat-form-field>

  <div class="spinner-overlay" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div class="table-container" *ngIf="!isLoading">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

      <ng-container matColumnDef="TaxCode">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Tax Code</th>
        <td mat-cell *matCellDef="let row">{{ row.taxCode }}</td>
      </ng-container>

      <ng-container matColumnDef="TaxCodeType">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Type</th>
        <td mat-cell *matCellDef="let row">{{ row.taxCodeType }}</td>
      </ng-container>

      <ng-container matColumnDef="TaxRate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Rate</th>
        <td mat-cell *matCellDef="let row">{{ row.taxRate }}</td>
      </ng-container>

      <ng-container matColumnDef="TaxJur">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Jurisdiction</th>
        <td mat-cell *matCellDef="let row">{{ row.taxJur }}</td>
      </ng-container>

      <ng-container matColumnDef="TaxJurDescription">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Description</th>
        <td mat-cell *matCellDef="let row">{{ row.taxJurDescription }}</td>
      </ng-container>

      <ng-container matColumnDef="NxtLvlCode">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Next Level Code</th>
        <td mat-cell *matCellDef="let row">{{ row.nxtLvlCode }}</td>
      </ng-container>

      <ng-container matColumnDef="NxtLvlDescription">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Next Level Description</th>
        <td mat-cell *matCellDef="let row">{{ row.nxtLvlDescription }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSize]="rowCount" [pageSizeOptions]="rowCountOptions"></mat-paginator>
  </div>
</div>
