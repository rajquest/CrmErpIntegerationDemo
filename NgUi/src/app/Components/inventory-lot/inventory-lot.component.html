<div class="items-container">
  <h2>Infor ERP Inventory Lots</h2>

  <mat-form-field appearance="outline" class="row-select">
    <mat-label>Rows per page</mat-label>
    <mat-select [(value)]="rowCount" (selectionChange)="onRowCountChange($event.value)">
      <mat-option *ngFor="let count of rowCountOptions" [value]="count">
        {{ count }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="filter-box">
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search item, description, or lot" />
  </mat-form-field>

  <div class="spinner-overlay" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div class="table-container" *ngIf="!isLoading">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
      <ng-container matColumnDef="item">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Item</th>
        <td mat-cell *matCellDef="let row">{{ row.item }}</td>
      </ng-container>

      <ng-container matColumnDef="itemDescription">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Description</th>
        <td mat-cell *matCellDef="let row">{{ row.itemDescription }}</td>
      </ng-container>

      <ng-container matColumnDef="revision">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Revision</th>
        <td mat-cell *matCellDef="let row">{{ row.revision }}</td>
      </ng-container>

      <ng-container matColumnDef="expDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Exp Date</th>
        <td mat-cell *matCellDef="let row">{{ row.expDate }}</td>
      </ng-container>

      <ng-container matColumnDef="derQtyOnHand">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Qty On Hand</th>
        <td mat-cell *matCellDef="let row">{{ row.derQtyOnHand }}</td>
      </ng-container>

      <ng-container matColumnDef="derExtUnitCost">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Ext. Unit Cost</th>
        <td mat-cell *matCellDef="let row">{{ row.derExtUnitCost }}</td>
      </ng-container>

      <ng-container matColumnDef="itemU_M">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">U/M</th>
        <td mat-cell *matCellDef="let row">{{ row.itemU_M }}</td>
      </ng-container>

      <ng-container matColumnDef="lot">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="tb-header-cell">Lot</th>
        <td mat-cell *matCellDef="let row">{{ row.lot }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSize]="rowCount" [pageSizeOptions]="rowCountOptions"></mat-paginator>
  </div>
</div>
