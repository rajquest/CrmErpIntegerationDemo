<div class="dashboard-container">
  <div class="page-header">
    <h2 class="title">OAuth Token Generator</h2>
    <button (click)="clearTokens()" class="clearButton">
      Clear All Tokens
    </button>
  </div>

  <div class="token-panel">
    <!-- Left Panel: Infor Tokens -->
    <div class="token-card">
      <h3>Infor Tokens</h3>

      <div class="form-section">
        <button (click)="getInforAppToken()" class="redButton">
          Get Infor App OAuth Token
        </button>
        @if (inforTokenFetched()) {
          <div class="result-section">
            <label>Infor App Access Token:</label>
            <textarea rows="6" readonly>{{ accessToken() || errorMessage() }}</textarea>
          </div>
        }
      </div>

      <hr class="divider" />

      <div class="form-section">
        <button (click)="getInforApiToken()" class="redButton">
          Get Infor API Token
        </button>
        @if (inforApiTokenFetched()) {
          <div class="result-section">
            <label>API Access Token:</label>
            <textarea rows="6" readonly>{{ apiAccessToken() || appErrorMessage() }}</textarea>
          </div>
        }
      </div>

      <hr class="divider" />

      <div class="form-section">
        <label class="override-label">Infor API Token Override</label>
        <textarea rows="4" [(ngModel)]="overrideTokenInput" placeholder="Paste token here..."></textarea>
        <button (click)="saveOverrideToken()" class="redButton override-btn">
          Save Override Token
        </button>
        @if (overrideSaved()) {
          <div class="override-feedback">Saved to sessionStorage as <code>inforAPIOverideToken</code></div>
        }
      </div>
    </div>

    <!-- Right Panel: Salesforce Token -->
    <div class="token-card">
      <h3>Salesforce</h3>
      <div class="form-section">
        <button (click)="getSalesforceToken()" class="blueButton">
          Get Salesforce API Token
        </button>
        @if (sfTokenFetched()) {
          <div class="result-section">
            <label>Salesforce Access Token:</label>
            <textarea rows="6" readonly>{{ sfAccessToken() || sfErrorMessage() }}</textarea>
          </div>
        }
      </div>
    </div>
  </div>
</div>
